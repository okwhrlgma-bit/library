name: Release — git tag → GitHub Release 자동 발행

# git tag v0.5.0 push 시 자동 GitHub Release 생성
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (예: v0.5.0)'
        required: true
        default: 'v0.5.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 history (release notes 생성)

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .

      - name: Verify quality (pytest·ruff)
        run: |
          ruff check .
          pytest -q --tb=short

      - name: Extract release notes from CHANGELOG_NIGHT.md
        id: notes
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          # CHANGELOG_NIGHT.md에서 해당 버전 섹션 추출
          awk "/^## ${TAG}/,/^## v[0-9]/" CHANGELOG_NIGHT.md | head -n -1 > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "## ${TAG}" > release_notes.md
            echo "" >> release_notes.md
            echo "자동 생성 release. CHANGELOG_NIGHT.md 참조." >> release_notes.md
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: ${{ steps.notes.outputs.tag }} — kormarc-auto
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: true  # auto-generate (위 body에 추가)

      - name: Notify
        if: success()
        run: |
          echo "::notice::Release ${{ steps.notes.outputs.tag }} 발행 완료"
          echo "::notice::https://github.com/${{ github.repository }}/releases/tag/${{ steps.notes.outputs.tag }}"
